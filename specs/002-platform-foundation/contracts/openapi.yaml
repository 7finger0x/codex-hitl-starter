openapi: 3.1.0
x-status: superseded-planning-sketch
x-superseded-by: foundation-api.openapi.json
info:
  title: AI Trading OS Platform Foundation API
  version: 0.1.0
  description: >-
    Phase 1 planning contract for identity, tenancy, authorization, capabilities,
    audit evidence, and verification. Approval of this plan does not authorize
    public API implementation or publication.
servers:
  - url: /
tags:
  - name: Health
  - name: Session
  - name: Tenants
  - name: Memberships
  - name: Roles
  - name: Environments
  - name: Capabilities
  - name: Audit
  - name: Evidence
security:
  - bearerAuth: []
paths:
  /health/live:
    get:
      tags: [Health]
      operationId: getLiveness
      security: []
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /health/ready:
    get:
      tags: [Health]
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: Required dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /health/startup:
    get:
      tags: [Health]
      operationId: getStartup
      security: []
      responses:
        "200":
          description: Startup checks completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/session:
    get:
      tags: [Session]
      operationId: getSessionContext
      responses:
        "200":
          description: Current identity and available tenant contexts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/tenants:
    get:
      tags: [Tenants]
      operationId: listTenants
      responses:
        "200":
          description: Tenants visible through current active memberships.
          content:
            application/json:
              schema:
                type: object
                required: [items, page]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tenant"
                  page:
                    $ref: "#/components/schemas/PageMetadata"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Tenants]
      operationId: createTenant
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Tenant, owner membership, and default environment created.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantBootstrap"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/Unprocessable"
  /v1/tenants/{tenantId}/members:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - $ref: "#/components/parameters/TenantContext"
      - $ref: "#/components/parameters/EnvironmentContext"
    get:
      tags: [Memberships]
      operationId: listMemberships
      responses:
        "200":
          description: Tenant-scoped memberships.
          content:
            application/json:
              schema:
                type: object
                required: [items, page]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Membership"
                  page:
                    $ref: "#/components/schemas/PageMetadata"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Memberships]
      operationId: inviteMember
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "201":
          description: Membership invitation recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/Unprocessable"
  /v1/tenants/{tenantId}/members/{membershipId}:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - $ref: "#/components/parameters/MembershipId"
      - $ref: "#/components/parameters/TenantContext"
      - $ref: "#/components/parameters/EnvironmentContext"
    patch:
      tags: [Memberships]
      operationId: updateMembership
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMembershipRequest"
      responses:
        "200":
          description: Membership updated.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/Unprocessable"
  /v1/tenants/{tenantId}/roles:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - $ref: "#/components/parameters/TenantContext"
      - $ref: "#/components/parameters/EnvironmentContext"
    get:
      tags: [Roles]
      operationId: listRoles
      responses:
        "200":
          description: Tenant role definitions.
          content:
            application/json:
              schema:
                type: object
                required: [items, page]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"
                  page:
                    $ref: "#/components/schemas/PageMetadata"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Roles]
      operationId: createRole
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Tenant role created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/Unprocessable"
  /v1/tenants/{tenantId}/environments:
    parameters:
      - $ref: "#/components/parameters/TenantId"
      - $ref: "#/components/parameters/TenantContext"
    get:
      tags: [Environments]
      operationId: listEnvironments
      responses:
        "200":
          description: Environments visible to the current membership.
          content:
            application/json:
              schema:
                type: object
                required: [items, page]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Environment"
                  page:
                    $ref: "#/components/schemas/PageMetadata"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Environments]
      operationId: createEnvironment
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnvironmentRequest"
      responses:
        "201":
          description: Environment created in provisioning state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/Unprocessable"
  /v1/capabilities:
    get:
      tags: [Capabilities]
      operationId: getCapabilityManifest
      parameters:
        - $ref: "#/components/parameters/TenantContext"
        - $ref: "#/components/parameters/EnvironmentContext"
      responses:
        "200":
          description: Capability projection for the current authoritative context.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityManifest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /v1/audit-events:
    get:
      tags: [Audit]
      operationId: listAuditEvents
      parameters:
        - $ref: "#/components/parameters/TenantContext"
        - $ref: "#/components/parameters/EnvironmentContext"
        - name: correlation_id
          in: query
          schema:
            type: string
            format: uuid
        - name: event_type
          in: query
          schema:
            type: string
            maxLength: 128
        - name: cursor
          in: query
          schema:
            type: string
            maxLength: 1024
      responses:
        "200":
          description: Tenant-scoped append-only audit evidence.
          content:
            application/json:
              schema:
                type: object
                required: [items, page]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
                  page:
                    $ref: "#/components/schemas/PageMetadata"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /v1/evidence-runs:
    get:
      tags: [Evidence]
      operationId: listEvidenceRuns
      parameters:
        - $ref: "#/components/parameters/TenantContext"
        - $ref: "#/components/parameters/EnvironmentContext"
      responses:
        "200":
          description: Verification run summaries visible to the current context.
          content:
            application/json:
              schema:
                type: object
                required: [items, page]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/EvidenceRun"
                  page:
                    $ref: "#/components/schemas/PageMetadata"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Evidence]
      operationId: startEvidenceRun
      parameters:
        - $ref: "#/components/parameters/TenantContext"
        - $ref: "#/components/parameters/EnvironmentContext"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartEvidenceRunRequest"
      responses:
        "202":
          description: Verification run accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceRun"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "429":
          $ref: "#/components/responses/TooManyRequests"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MembershipId:
      name: membershipId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TenantContext:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    EnvironmentContext:
      name: X-Environment-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 255
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
  headers:
    ETag:
      description: Opaque optimistic-concurrency token.
      schema:
        type: string
  responses:
    BadRequest:
      description: Malformed request or context.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Authentication is missing, invalid, or expired.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: The authoritative policy decision denied the action.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource is absent or intentionally concealed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: State, uniqueness, or idempotency conflict.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    PreconditionFailed:
      description: Optimistic-concurrency precondition failed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unprocessable:
      description: Schema-valid request violates domain constraints.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    TooManyRequests:
      description: Bounded operation rate exceeded.
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ServiceUnavailable:
      description: Required dependency is unavailable.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, checked_at, checks]
      properties:
        status:
          type: string
          enum: [pass, fail]
        checked_at:
          type: string
          format: date-time
        checks:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [id, status]
            properties:
              id:
                type: string
              status:
                type: string
                enum: [pass, fail]
              code:
                type: string
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [type, title, status, code, correlation_id, retryable]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
          pattern: "^[A-Z][A-Z0-9_]{2,63}$"
        correlation_id:
          type: string
          format: uuid
        detail:
          type: string
          maxLength: 1024
        retryable:
          type: boolean
        retry_after_seconds:
          type: integer
          minimum: 1
        field_errors:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [field, code]
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string
    PageMetadata:
      type: object
      additionalProperties: false
      required: [has_more]
      properties:
        next_cursor:
          type: [string, "null"]
        has_more:
          type: boolean
    Tenant:
      type: object
      additionalProperties: false
      required: [id, slug, display_name, status, version, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        display_name:
          type: string
          minLength: 1
          maxLength: 120
        status:
          type: string
          enum: [provisioning, active, suspended, archived]
        version:
          type: integer
          minimum: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Environment:
      type: object
      additionalProperties: false
      required: [id, tenant_id, key, display_name, risk_tier, status, version]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        key:
          type: string
          pattern: "^[a-z][a-z0-9-]{0,62}$"
        display_name:
          type: string
          minLength: 1
          maxLength: 120
        risk_tier:
          type: string
          enum: [development, staging, production]
        status:
          type: string
          enum: [provisioning, active, suspended, archived]
        version:
          type: integer
          minimum: 1
    Membership:
      type: object
      additionalProperties: false
      required: [id, tenant_id, user_id, status, role_ids, version]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [invited, active, suspended, revoked]
        role_ids:
          type: array
          uniqueItems: true
          items:
            type: string
            format: uuid
        environment_ids:
          type: array
          uniqueItems: true
          items:
            type: string
            format: uuid
        version:
          type: integer
          minimum: 1
    Role:
      type: object
      additionalProperties: false
      required: [id, tenant_id, name, permission_codes, built_in, status, version]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 80
        permission_codes:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: "^[a-z][a-z0-9_.:-]{2,127}$"
        built_in:
          type: boolean
        status:
          type: string
          enum: [active, retired]
        version:
          type: integer
          minimum: 1
    CapabilityManifest:
      type: object
      additionalProperties: false
      required:
        [tenant_id, environment_id, membership_version, policy_version, generated_at, capabilities]
      properties:
        tenant_id:
          type: string
          format: uuid
        environment_id:
          type: string
          format: uuid
        membership_version:
          type: integer
          minimum: 1
        policy_version:
          type: string
        generated_at:
          type: string
          format: date-time
        capabilities:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [key, allowed_actions]
            properties:
              key:
                type: string
              allowed_actions:
                type: array
                uniqueItems: true
                items:
                  type: string
              constraints:
                type: object
                additionalProperties: true
    AuditEvent:
      type: object
      additionalProperties: false
      required:
        [event_id, sequence, tenant_id, event_type, action, decision, outcome, correlation_id, event_hash, occurred_at]
      properties:
        event_id:
          type: string
          format: uuid
        sequence:
          type: integer
          minimum: 1
        tenant_id:
          type: string
          format: uuid
        environment_id:
          type: [string, "null"]
          format: uuid
        event_type:
          type: string
        actor:
          type: object
          additionalProperties: false
          required: [kind, id]
          properties:
            kind:
              type: string
              enum: [user, service, system]
            id:
              type: string
        resource:
          type: object
          additionalProperties: false
          required: [type, id]
          properties:
            type:
              type: string
            id:
              type: string
        action:
          type: string
        reason_code:
          type: string
        decision:
          type: string
          enum: [allow, deny, not_applicable]
        outcome:
          type: string
          enum: [succeeded, failed, denied]
        policy_version:
          type: string
        correlation_id:
          type: string
          format: uuid
        previous_hash:
          type: [string, "null"]
          pattern: "^[a-f0-9]{64}$"
        event_hash:
          type: string
          pattern: "^[a-f0-9]{64}$"
        occurred_at:
          type: string
          format: date-time
    EvidenceRun:
      type: object
      additionalProperties: false
      required: [id, source_revision, status, started_at]
      properties:
        id:
          type: string
          format: uuid
        source_revision:
          type: string
          pattern: "^[a-fA-F0-9]{40,64}$"
        status:
          type: string
          enum: [queued, running, passed, failed, cancelled]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time
        manifest_hash:
          type: [string, "null"]
          pattern: "^[a-f0-9]{64}$"
    SessionContext:
      type: object
      additionalProperties: false
      required: [user_id, session_id, assurance_level, tenants]
      properties:
        user_id:
          type: string
          format: uuid
        session_id:
          type: string
        assurance_level:
          type: string
        tenants:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [tenant, membership, environments]
            properties:
              tenant:
                $ref: "#/components/schemas/Tenant"
              membership:
                $ref: "#/components/schemas/Membership"
              environments:
                type: array
                items:
                  $ref: "#/components/schemas/Environment"
    TenantBootstrap:
      type: object
      additionalProperties: false
      required: [tenant, owner_membership, default_environment]
      properties:
        tenant:
          $ref: "#/components/schemas/Tenant"
        owner_membership:
          $ref: "#/components/schemas/Membership"
        default_environment:
          $ref: "#/components/schemas/Environment"
    CreateTenantRequest:
      type: object
      additionalProperties: false
      required: [slug, display_name, default_environment]
      properties:
        slug:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        display_name:
          type: string
          minLength: 1
          maxLength: 120
        default_environment:
          $ref: "#/components/schemas/CreateEnvironmentRequest"
    CreateEnvironmentRequest:
      type: object
      additionalProperties: false
      required: [key, display_name, risk_tier]
      properties:
        key:
          type: string
          pattern: "^[a-z][a-z0-9-]{0,62}$"
        display_name:
          type: string
          minLength: 1
          maxLength: 120
        risk_tier:
          type: string
          enum: [development, staging, production]
    InviteMemberRequest:
      type: object
      additionalProperties: false
      required: [email, role_ids, environment_ids]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        role_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            format: uuid
        environment_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            format: uuid
    UpdateMembershipRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        status:
          type: string
          enum: [active, suspended, revoked]
        role_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            format: uuid
        environment_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            format: uuid
    CreateRoleRequest:
      type: object
      additionalProperties: false
      required: [name, permission_codes]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        permission_codes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            pattern: "^[a-z][a-z0-9_.:-]{2,127}$"
    StartEvidenceRunRequest:
      type: object
      additionalProperties: false
      required: [source_revision, check_profile]
      properties:
        source_revision:
          type: string
          pattern: "^[a-fA-F0-9]{40,64}$"
        check_profile:
          type: string
          enum: [foundation, control-plane, full]
        documented_worktree_state:
          type: string
          maxLength: 4096
