global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    deployment_environment: local
    data_classification: synthetic

rule_files:
  - /etc/prometheus/rules/foundation-alerts.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090
        labels:
          service_owner: platform-operations

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
          - otel-collector:8889
        labels:
          service_owner: platform-observability

  - job_name: platform-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:3001
        labels:
          service_owner: platform-api

  - job_name: platform-workers
    metrics_path: /metrics
    static_configs:
      - targets:
          - workers:9464
        labels:
          service_owner: platform-workers

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100
        labels:
          service_owner: platform-observability

  - job_name: tempo
    static_configs:
      - targets:
          - tempo:3200
        labels:
          service_owner: platform-observability

  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000
        labels:
          service_owner: platform-observability
