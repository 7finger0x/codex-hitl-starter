name: platform-foundation-local

x-foundation-labels: &foundation-labels
  com.7fingerstudios.project: platform-foundation
  com.7fingerstudios.environment: local
  com.7fingerstudios.classification: synthetic

x-runtime-security: &runtime-security
  restart: unless-stopped
  init: true
  read_only: true
  pids_limit: 256
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=64m,mode=1777,nosuid,nodev,noexec
  labels: *foundation-labels

x-http-health: &http-health
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 30s

services:
  web:
    <<: *runtime-security
    image: docker.io/library/node:24.18.0-bookworm-slim@sha256:cb4e8f7c443347358b7875e717c29e27bf9befc8f5a26cf18af3c3dec80e58c5
    profiles:
      - application
    user: "65532:65532"
    working_dir: /workspace
    command:
      - corepack
      - pnpm
      - --filter
      - "@ai-trading-os/web"
      - dev
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      PLATFORM_DEPLOYMENT_ENVIRONMENT: local
      PLATFORM_API_URL: http://api:3001
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./:/workspace:ro
    networks:
      - foundation_edge
      - foundation_observability
    cpus: "0.75"
    mem_limit: 512m
    healthcheck:
      <<: *http-health
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))

  api:
    <<: *runtime-security
    image: docker.io/library/node:24.18.0-bookworm-slim@sha256:cb4e8f7c443347358b7875e717c29e27bf9befc8f5a26cf18af3c3dec80e58c5
    profiles:
      - application
    user: "65532:65532"
    working_dir: /workspace
    command:
      - corepack
      - pnpm
      - --filter
      - "@ai-trading-os/api"
      - dev
    environment:
      NODE_ENV: development
      PORT: "3001"
      PLATFORM_DEPLOYMENT_ENVIRONMENT: local
      DATABASE_URL: postgres://platform_api:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-platform_foundation_hcp03}
      VALKEY_URL: redis://valkey:6379/0
      AUTH_URL: http://auth:9999
      STORAGE_URL: http://storage:5000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./:/workspace:ro
    networks:
      - foundation_edge
      - foundation_data
      - foundation_observability
    cpus: "1.00"
    mem_limit: 768m
    healthcheck:
      <<: *http-health
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))

  workers:
    <<: *runtime-security
    image: docker.io/library/node:24.18.0-bookworm-slim@sha256:cb4e8f7c443347358b7875e717c29e27bf9befc8f5a26cf18af3c3dec80e58c5
    profiles:
      - application
    user: "65532:65532"
    working_dir: /workspace
    command:
      - corepack
      - pnpm
      - --filter
      - "@ai-trading-os/workers"
      - dev
    environment:
      NODE_ENV: development
      PLATFORM_DEPLOYMENT_ENVIRONMENT: local
      DATABASE_URL: postgres://platform_worker:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-platform_foundation_hcp03}
      VALKEY_URL: redis://valkey:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./:/workspace:ro
    networks:
      - foundation_data
      - foundation_observability
    cpus: "1.00"
    mem_limit: 768m
    healthcheck:
      <<: *http-health
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:9464/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))

  postgres:
    <<: *runtime-security
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,nodev,noexec
      - /var/run/postgresql:size=16m,mode=0755,uid=100,gid=101,nosuid,nodev,noexec
    image: docker.io/supabase/postgres:17.6.1.136@sha256:f371b5f3f2ac0a05703f33d6e6134515fb2498cab708fb948a0aeb7481467c00
    pids_limit: 512
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-platform_foundation_hcp03}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data
      PLATFORM_DATABASE_COMMENT: DISPOSABLE:002-platform-foundation:HCP-03
    volumes:
      - foundation_postgres_data:/var/lib/postgresql/data
      - foundation_postgres_custom:/etc/postgresql-custom
      - ./infra/environments/local/postgres/010-platform-foundation-identity.sql:/docker-entrypoint-initdb.d/010-platform-foundation-identity.sql:ro
    networks:
      - foundation_edge
      - foundation_data
    cpus: "2.00"
    mem_limit: 2g
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
      test:
        - CMD-SHELL
        - pg_isready --host 127.0.0.1 --port 5432 --username postgres --dbname "$${POSTGRES_DB}"

  auth:
    <<: *runtime-security
    image: docker.io/supabase/gotrue:v2.189.0@sha256:385184459f57569c54c25209f51f3b2be99ddd7c4ce9e3555b5d3eea8447b7cf
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://127.0.0.1:55433
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-platform_foundation_hcp03}
      GOTRUE_SITE_URL: ${SITE_URL:-http://127.0.0.1:3000}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-http://127.0.0.1:3000/**}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    networks:
      - foundation_edge
      - foundation_data
    cpus: "0.50"
    mem_limit: 256m
    healthcheck:
      <<: *http-health
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:9999/health || exit 1

  rest:
    <<: *runtime-security
    image: docker.io/postgrest/postgrest:v14.12@sha256:54000f24847d01a2c2302e0041cf0618b875c57fb48507d743cfa9aaa50bf43c
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-platform_foundation_hcp03}
      PGRST_DB_SCHEMAS: platform
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    networks:
      - foundation_edge
      - foundation_data
    cpus: "0.50"
    mem_limit: 256m
    healthcheck:
      <<: *http-health
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1

  realtime:
    <<: *runtime-security
    image: docker.io/supabase/realtime:v2.102.3@sha256:aa1c92c0cf326007563641730ec9da9c60478caa6853887775365fa2c097a471
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "4000"
      API_EXTERNAL_URL: http://127.0.0.1:55435
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: ${POSTGRES_DB:-platform_foundation_hcp03}
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime
      DB_ENC_KEY: ${JWT_SECRET:?JWT_SECRET is required}
      API_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SECRET_KEY_BASE: ${JWT_SECRET:?JWT_SECRET is required}
      APP_NAME: realtime-dev
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
    networks:
      - foundation_edge
      - foundation_data
    cpus: "1.00"
    mem_limit: 512m
    healthcheck:
      <<: *http-health
      start_period: 45s
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:4000/api/tenants/realtime-dev/health || exit 1

  storage:
    <<: *runtime-security
    image: docker.io/supabase/storage-api:v1.60.4@sha256:c8eb9858eafec891a97c27125470aaad54703c3f4eb4d55ca7f1bf6c6411febf
    depends_on:
      postgres:
        condition: service_healthy
      rest:
        condition: service_healthy
    environment:
      PORT: "5000"
      ANON_KEY: ${ANON_KEY:?ANON_KEY is required}
      SERVICE_KEY: ${SERVICE_ROLE_KEY:?SERVICE_ROLE_KEY is required}
      PGRST_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      POSTGREST_URL: http://rest:3000
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-platform_foundation_hcp03}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      FILE_SIZE_LIMIT: "52428800"
      TENANT_ID: local
      REGION: local
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - foundation_storage_data:/var/lib/storage
    networks:
      - foundation_edge
      - foundation_data
    cpus: "1.00"
    mem_limit: 512m
    healthcheck:
      <<: *http-health
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:5000/status || exit 1

  valkey:
    <<: *runtime-security
    image: docker.io/valkey/valkey:9.1.0-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
    user: "999:999"
    command:
      - valkey-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
    volumes:
      - foundation_valkey_data:/data
    networks:
      - foundation_data
    cpus: "0.50"
    mem_limit: 256m
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
      test:
        - CMD
        - valkey-cli
        - ping

  otel-collector:
    <<: *runtime-security
    image: docker.io/otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
    profiles:
      - observability
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./infra/modules/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - foundation_observability
    cpus: "0.50"
    mem_limit: 256m
    healthcheck:
      <<: *http-health
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:13133/ || exit 1

  prometheus:
    <<: *runtime-security
    image: docker.io/prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    profiles:
      - observability
    user: "65534:65534"
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
      - --storage.tsdb.retention.size=1GB
      - --web.enable-lifecycle=false
    volumes:
      - ./infra/modules/observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./infra/modules/observability/prometheus-rules/foundation-alerts.yaml:/etc/prometheus/rules/foundation-alerts.yaml:ro
      - foundation_prometheus_data:/prometheus
    networks:
      - foundation_observability
    cpus: "1.00"
    mem_limit: 768m
    healthcheck:
      <<: *http-health
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:9090/-/ready || exit 1

  loki:
    <<: *runtime-security
    image: docker.io/grafana/loki:3.7.3@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8
    profiles:
      - observability
    user: "10001:10001"
    command:
      - -config.file=/etc/loki/loki.yaml
    volumes:
      - ./infra/modules/observability/loki.yaml:/etc/loki/loki.yaml:ro
      - foundation_loki_data:/loki
    networks:
      - foundation_observability
    cpus: "0.50"
    mem_limit: 512m
    healthcheck:
      <<: *http-health
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3100/ready || exit 1

  tempo:
    <<: *runtime-security
    image: docker.io/grafana/tempo:3.0.2@sha256:cda87c212d8c584dc0b89e337e7ed648a5100feb657e5d528480ee4fa03dbbe3
    profiles:
      - observability
    user: "10001:10001"
    command:
      - -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./infra/modules/observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - foundation_tempo_data:/var/tempo
    networks:
      - foundation_observability
    cpus: "0.50"
    mem_limit: 512m
    healthcheck:
      <<: *http-health
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3200/ready || exit 1

  grafana:
    <<: *runtime-security
    image: docker.io/grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    profiles:
      - observability
    user: "472:472"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SECURITY_ADMIN_USER: foundation-admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/modules/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/modules/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - foundation_grafana_data:/var/lib/grafana
    networks:
      - foundation_edge
      - foundation_observability
    cpus: "0.50"
    mem_limit: 512m
    healthcheck:
      <<: *http-health
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1

networks:
  foundation_edge:
    name: platform-foundation-local-edge
    driver: bridge
    labels: *foundation-labels
  foundation_data:
    name: platform-foundation-local-data
    driver: bridge
    internal: true
    labels: *foundation-labels
  foundation_observability:
    name: platform-foundation-local-observability
    driver: bridge
    internal: true
    labels: *foundation-labels

volumes:
  foundation_postgres_data:
    name: foundation_postgres_data
    labels:
      <<: *foundation-labels
      com.7fingerstudios.disposable: "true"
  foundation_postgres_custom:
    name: foundation_postgres_custom
    labels:
      <<: *foundation-labels
      com.7fingerstudios.disposable: "true"
  foundation_storage_data:
    name: foundation_storage_data
    labels:
      <<: *foundation-labels
      com.7fingerstudios.disposable: "true"
  foundation_valkey_data:
    name: foundation_valkey_data
    labels:
      <<: *foundation-labels
      com.7fingerstudios.disposable: "true"
  foundation_prometheus_data:
    name: foundation_prometheus_data
    labels:
      <<: *foundation-labels
      com.7fingerstudios.disposable: "true"
  foundation_loki_data:
    name: foundation_loki_data
    labels:
      <<: *foundation-labels
      com.7fingerstudios.disposable: "true"
  foundation_tempo_data:
    name: foundation_tempo_data
    labels:
      <<: *foundation-labels
      com.7fingerstudios.disposable: "true"
  foundation_grafana_data:
    name: foundation_grafana_data
    labels:
      <<: *foundation-labels
      com.7fingerstudios.disposable: "true"
